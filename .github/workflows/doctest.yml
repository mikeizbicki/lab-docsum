name: doctest

on:
  push:
    branches: ['*']

jobs:
  tests:
    strategy:
      matrix:
        python: [3.14]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov coverage groq python-dotenv

      - name: Run doctests with coverage
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
           pytest chat.py tools/calculate.py tools/ls.py tools/cat.py tools/grep.py --doctest-modules --cov=tools --cov-branch --cov-report=term-missing

      - name: Coverage report
        run: |
          python -m coverage report -m
          python -m coverage xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml

  